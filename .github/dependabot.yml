version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - npm
    groups:
      npm-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      npm-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major

  - package-ecosystem: cargo
    directory: "/src-tauri"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - rust
    groups:
      cargo-minor-patch:
        applies-to: version-updates
        update-types:
          - minor
          - patch
      cargo-security:
        applies-to: security-updates
        patterns:
          - "*"
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
      - dependency-name: "tauri"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
      - dependency-name: "tauri-build"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major
      - dependency-name: "tauri-plugin-*"
        update-types:
          - version-update:semver-minor
          - version-update:semver-major

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - github-actions
    groups:
      actions-all:
        patterns:
          - "*"

  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 2
    labels:
      - dependencies
      - docker
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
